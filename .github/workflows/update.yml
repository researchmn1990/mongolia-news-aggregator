name: update news

on:
  schedule:
    - cron: "0 * * * *"

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - name: install python

      uses: actions/setup-python@v4

      with:
        python-version: "3.10"

    - name: install packages

      run: |

        pip install -r requirements.txt

    - name: run crawler

      run: |

        python crawler.py

    - name: commit

      run: |

        git config --global user.name "bot"
        git config --global user.email "bot@github.com"

        git add news.json

        git commit -m "update news" || echo "no change"

        git push
